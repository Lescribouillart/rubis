<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur des gryffons</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Compteur de Rubis <span class="lion"><img src="images/lion.png" alt="Lion Gryffondor" class="lion-img" width="32" height="32" /></span></h1>
    <a href="#bas-page" class="scroll-bottom-btn" title="Aller en bas">
        <img src="images/bas.png" alt="Aller en bas" width="48" height="48" />
    </a>
    <a href="#" class="scroll-top-btn" title="Aller en haut">
        <img src="images/haut.png" alt="Aller en haut" width="48" height="48" />
    </a>
    <div id="rubis-total">
        <span>Total :&nbsp;</span>
        <span id="total-rubis">0</span>
        <span class="ruby">
            <img src="images/rubis.png" alt="Rubis" class="ruby-img" width="28" height="28" />
        </span>
    </div>
    <div class="reset-btn-container">
        <button id="reset-btn" type="button" class="reset-btn-inline">
            <img src="images/reinitialiser.png" alt="Réinitialiser" width="28" height="28" style="vertical-align: middle;" />
        </button>
    </div>
    <form id="defis-form">
        <!-- Les défis seront générés ici par JavaScript -->
    </form>
    <div style="display: flex; justify-content: center; margin-bottom: 30px;">
        <button id="valider-btn" type="button">Valider</button>
    </div>
    <div id="bas-page"></div>
    <script src="script.js"></script>
</body>
</html>
