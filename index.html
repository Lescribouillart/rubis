<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le compteur des gryffons</title>
    <link rel="icon" type="image/png" href="images/rubis.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e53935">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/icon-192.png">
</head>
<body>
    <h1>Compteur de Rubis 
        <span class="lion">
            <img src="images/lion.png" alt="Lion Gryffondor" class="lion-img" width="32" height="32" />
            <span class="lion-bulle">Roaaarr !!</span>
        </span>
    </h1>
    <a href="#bas-page" class="scroll-bottom-btn" title="Aller en bas">
        <img src="images/bas.png" alt="Aller en bas" width="24" height="24" />
    </a>
    <a href="#" class="scroll-top-btn" title="Aller en haut">
        <img src="images/haut.png" alt="Aller en haut" width="24" height="24" />
    </a>
    <div id="rubis-total">
        <span>Total :&nbsp;</span>
        <span id="total-rubis">0</span>
        <span class="ruby">
            <img src="images/rubis.png" alt="Rubis" class="ruby-img" width="28" height="28" />
        </span>
    </div>
    <div class="reset-btn-container">
        <button id="reset-btn" type="button" class="reset-btn-inline">
            <img src="images/reinitialiser.png" alt="Réinitialiser" width="28" height="28" style="vertical-align: middle;" />
        </button>
    </div>
    <form id="defis-form">
        <!-- Les défis seront générés ici par JavaScript -->
    </form>
    <div style="display: flex; justify-content: center; margin-bottom: 30px;">
        <button id="valider-btn" type="button">Valider</button>
    </div>
    <div id="bas-page"></div>
    <script src="script.js"></script>
    <script>
    // Affiche la bulle "Roaaarr" au survol du lion
    document.addEventListener('DOMContentLoaded', function() {
        const lion = document.querySelector('.lion-img');
        const bulle = document.querySelector('.lion-bulle');
        if (lion && bulle) {
            lion.addEventListener('mouseenter', () => {
                bulle.style.display = 'inline-block';
            });
            lion.addEventListener('mouseleave', () => {
                bulle.style.display = 'none';
            });
        }

        // Enregistrement du service worker pour PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(function(registration) {
                    // Succès
                    // console.log('Service Worker enregistré avec le scope :', registration.scope);
                })
                .catch(function(error) {
                    // console.log('Échec de l\'enregistrement du Service Worker :', error);
                });
        }
    });
    </script>
</body>
</html>
