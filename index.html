<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur des gryffons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Compteur de Rubis</h1>
    <div id="rubis-total">
        <span>Rubis total :</span> <span id="total-rubis">0</span>
        <span class="ruby">

        </span>
    </div>
    <form id="defis-form">
        <!-- Les défis seront générés ici par JavaScript -->
    </form>
    <button id="reset-btn">Réinitialiser</button>
    <script src="script.js"></script>
</body>
</html>
